  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 220px; min-width: 220px; background: #fff; border-right: 0.5px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow-y: auto; }
  .sidebar-header { padding: 20px 16px 12px; border-bottom: 0.5px solid rgba(0,0,0,0.1); }

  .brand-sub { font-size: 11px; color: #888; margin-top: 2px; }
  .nav-section { padding: 8px 0; }
  .nav-label { font-size: 10px; font-weight: 500; color: #aaa; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px 4px; }
  .nav-item { display: flex; align-items: center; gap: 9px; padding: 7px 16px; font-size: 13px; color: #666; cursor: pointer; border-left: 2px solid transparent; transition: all 0.12s; }
  .nav-item:hover { background: #f5f4f1; color: #1a1a1a; }
  .nav-item.active { background: #f5f4f1; color: #1a1a1a; border-left-color: #1D9E75; font-weight: 500; }
  .nav-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .main { flex: 1; overflow-y: auto; background: #f5f4f1; }
  .top-bar { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); padding: 14px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 10; }
  .page-title { font-size: 15px; font-weight: 500; color: #1a1a1a; flex: 1; }
  .search-box { display: flex; align-items: center; gap: 8px; background: #f5f4f1; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 8px; padding: 6px 12px; width: 220px; }
  .search-box input { background: none; border: none; outline: none; font-size: 13px; color: #1a1a1a; width: 100%; }
  .search-box input::placeholder { color: #bbb; }
  .content { padding: 20px 24px 40px; }
  .summary-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 8px; padding: 14px 16px; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 500; color: #1a1a1a; }
  .stat-sub { font-size: 11px; color: #bbb; margin-top: 3px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title { font-size: 13px; font-weight: 500; color: #1a1a1a; }
  .badge { display: inline-flex; align-items: center; font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
  .badge-gray { background: #f0efe8; color: #666; }
  .dept-section { margin-bottom: 28px; }
  .dept-header { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 12px 12px 0 0; padding: 14px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
  .dept-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
  .dept-meta { font-size: 12px; color: #888; }
  .sys-access { padding: 14px 20px; border-bottom: 0.5px solid rgba(0,0,0,0.08); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; background: #fff; }
  .sys-access-label { font-size: 11px; color: #bbb; margin-right: 4px; }
  .pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid rgba(0,0,0,0.15); color: #666; background: #f5f4f1; }
  .team-row { padding: 14px 20px; border-bottom: 0.5px solid rgba(0,0,0,0.08); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; background: #fff; }
  .team-chip { display: flex; align-items: center; gap: 7px; background: #f5f4f1; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 20px; padding: 4px 12px 4px 4px; }
  .table-wrap { overflow-x: auto; background: #fff; border-radius: 0 0 12px 12px; }
  .ops-label { padding: 8px 20px 4px; font-size: 11px; font-weight: 500; color: #bbb; text-transform: uppercase; letter-spacing: 0.06em; background: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th { text-align: left; padding: 9px 12px 9px 20px; font-size: 11px; font-weight: 500; color: #aaa; letter-spacing: 0.04em; text-transform: uppercase; background: #f9f8f5; border-bottom: 0.5px solid rgba(0,0,0,0.08); white-space: nowrap; }
  td { padding: 10px 12px 10px 20px; color: #1a1a1a; border-bottom: 0.5px solid rgba(0,0,0,0.06); vertical-align: top; line-height: 1.5; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf8; }
  .person-cell { display: flex; align-items: center; gap: 8px; }
  .avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; flex-shrink: 0; }
  .av-teal { background: #E1F5EE; color: #0F6E56; }

  .link-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #185FA5; padding: 3px 8px; border-radius: 6px; border: 0.5px solid #B5D4F4; background: #E6F1FB; cursor: pointer; }

  return name.split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase();
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function renderPill(text) {
  return `<span class="pill">${text}</span>`;
}

function renderSystemsTable(systems) {
  if (!systems || systems.length === 0) return `<div class="empty-state">No systems recorded.</div>`;
  return `<div class="table-wrap"><table>
    <thead><tr><th>System Name</th><th>Location</th><th>Assigned To</th><th>Purpose</th><th>Link</th></tr></thead>
    <tbody>${systems.map(s => `<tr>
      <td style="font-weight:500">${s.name}</td>
      <td><span class="loc-tag">${s.location}</span></td>
      <td><div class="person-cell"><div class="avatar ${s.av}">${initials(s.assigned)}</div><span>${s.assigned}</span></div></td>
      <td style="max-width:280px;color:#555">${s.purpose}</td>
      <td>${s.link ? `<span class="link-btn">${s.link}</span>` : `<span class="dash">—</span>`}</td>
    </tr>`).join("")}</tbody>
  </table></div>`;
}

function renderDeptView(id) {
  const d = data[id];
  if (!d) return "";
  const color = deptColors[id] || "#888";
  return `
    <div class="dept-section">
      <div class="dept-header">
        <div style="width:30px;height:30px;border-radius:8px;background:${hexToRgba(color,0.12)};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <div style="width:12px;height:12px;border-radius:3px;background:${color};opacity:0.85"></div>
        </div>
        <div style="flex:1">
          <div class="dept-name">${d.title}</div>
          <div class="dept-meta">${d.location}</div>
        </div>
        <span class="badge badge-gray">${d.systems ? d.systems.length : 0} systems</span>
      </div>
      ${d.sysAccess ? `<div class="sys-access"><span class="sys-access-label">System Access</span>${d.sysAccess.map(renderPill).join("")}</div>` : ""}
      ${d.people && d.people.length ? `
        <div class="team-row"><span class="sys-access-label">Team</span>
          ${d.people.map(p => `
            <div class="team-chip">
              <div class="avatar ${p.av}">${p.initials || initials(p.name)}</div>
              <span style="font-size:12px;color:#1a1a1a">${p.name}</span>
              ${p.email ? `<span style="font-size:11px;color:#bbb">${p.email}</span>` : ""}
            </div>`).join("")}
        </div>` : ""}
      <div class="ops-label">Operational Systems</div>
      ${renderSystemsTable(d.systems)}
    </div>`;
}

function renderOverview() {
  const depts = data.overview.depts;
  const totalSystems = depts.reduce((a, d) => a + d.systems, 0);
  return `
    <div class="summary-grid">
      <div class="stat-card"><div class="stat-label">Total Departments</div><div class="stat-value">${depts.length}</div><div class="stat-sub">Across 3 locations</div></div>
      <div class="stat-card"><div class="stat-label">Total Systems</div><div class="stat-value">${totalSystems}</div><div class="stat-sub">Operational sheets & tools</div></div>
      <div class="stat-card"><div class="stat-label">Locations</div><div class="stat-value">3</div><div class="stat-sub">Office · Central Kitchen · Café</div></div>
      <div class="stat-card"><div class="stat-label">Teams Tracked</div><div class="stat-value">10+</div><div class="stat-sub">With system access</div></div>
    </div>
    <div class="section-header"><div class="section-title">Departments</div></div>
    <div class="overview-grid">
      ${depts.map(d => `
        <div class="dept-card" onclick="showDept('${d.id}')">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="width:32px;height:32px;border-radius:8px;background:${hexToRgba(d.color,0.12)};display:flex;align-items:center;justify-content:center">
              <div style="width:12px;height:12px;border-radius:3px;background:${d.color};opacity:0.85"></div>
            </div>
            <span class="badge" style="background:${hexToRgba(d.color,0.1)};color:${d.color}">${d.systems} systems</span>
          </div>
          <div class="dept-card-name">${d.name}</div>
          <div style="font-size:11px;color:#bbb;margin-bottom:8px">${d.location}</div>
          <div class="dept-card-chips">${d.people.slice(0,2).map(p => `<span class="pill">${p}</span>`).join("")}</div>
        </div>`).join("")}
    </div>`;
}

function showDept(id) {
  currentDept = id;
  document.querySelectorAll(".nav-item").forEach(el => {
    el.classList.toggle("active", el.getAttribute("onclick") === `showDept('${id}')`);
  });
  const titleEl = document.getElementById("page-title");
  const content = document.getElementById("main-content");
  if (id === "overview") {
    titleEl.textContent = "All Departments";
    content.innerHTML = renderOverview();
  } else {
    titleEl.textContent = data[id] ? data[id].title : id;
    content.innerHTML = renderDeptView(id);
  }
}

function doSearch(q) {
  if (!q.trim()) { showDept(currentDept); return; }
  const query = q.toLowerCase();
  document.getElementById("page-title").textContent = `Search: "${q}"`;
  const results = [];
  Object.entries(data).forEach(([deptId, dept]) => {
    if (deptId === "overview") return;
    (dept.systems || []).forEach(s => {
      if (s.name.toLowerCase().includes(query) || s.purpose.toLowerCase().includes(query) || s.assigned.toLowerCase().includes(query)) {
        results.push({ ...s, dept: dept.title, deptId });
      }
    });
  });
  const content = document.getElementById("main-content");
  if (!results.length) {
    content.innerHTML = `<div class="empty-state" style="border-radius:12px;margin-top:8px"><div style="font-size:24px;margin-bottom:12px">🔍</div><div>No systems found for "${q}"</div></div>`;
    return;
  }
  content.innerHTML = `
    <div style="margin-bottom:16px"><span class="badge badge-gray">${results.length} result${results.length!==1?"s":""}</span></div>
    <div class="dept-section">
      <div class="table-wrap" style="border-radius:12px;border:0.5px solid rgba(0,0,0,0.1)"><table>
        <thead><tr><th>System Name</th><th>Department</th><th>Location</th><th>Assigned To</th><th>Purpose</th></tr></thead>
        <tbody>${results.map(s => `<tr>
          <td style="font-weight:500">${s.name}</td>
          <td><span class="badge" style="background:${hexToRgba(deptColors[s.deptId],0.1)};color:${deptColors[s.deptId]}">${s.dept}</span></td>
          <td><span class="loc-tag">${s.location}</span></td>
          <td><div class="person-cell"><div class="avatar ${s.av}">${initials(s.assigned)}</div><span>${s.assigned}</span></div></td>
          <td style="max-width:260px;color:#555">${s.purpose}</td>
        </tr>`).join("")}</tbody>
      </table></div>
    </div>`;
}

showDept("overview");
</script>
</body>
</html>
